name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  quality:
    name: Lint, Typecheck, Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Oxlint (main process + shared)
        run: npm run lint:fast

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck specs
        run: npm run typecheck:spec

      - name: Verify IPC channels
        run: npm run verify:ipc

      - name: Verify package exports
        run: npm run verify:exports

      - name: Check TypeScript file size ratchet
        run: npm run check:ts-max-loc

      - name: Build main smoke
        run: npm run build:main

      - name: Build worker agent smoke
        run: npm run build:worker-agent

      - name: Build renderer (Angular AOT)
        run: npm run build:renderer

      - name: Verify architecture (import boundaries + inventory)
        run: npm run verify:architecture

      - name: Check contracts (schema/alias drift)
        run: npm run check:contracts

      - name: Check provider parity checklist
        run: npm run check:provider-parity

      # Non-blocking: surfaces drift between the committed offline model-catalog
      # snapshot and live models.dev. Kept out of the hard gate on purpose — the
      # snapshot tracks an external source that publishes new models on its own
      # cadence, so an unrelated PR must not fail just because models.dev moved.
      # `--check` is fail-soft when models.dev is unreachable (exit 0). When this
      # step shows red, run `npm run sync:model-catalog` and commit the refresh.
      - name: Check model-catalog snapshot drift
        run: npm run sync:model-catalog -- --check
        continue-on-error: true

      # Block high-severity vulnerabilities in production dependencies.
      - name: Security audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

  test:
    name: Test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install --yes ripgrep

      - name: Install dependencies
        run: npm ci

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: npm run test -- --shard=${{ matrix.shard }}/4

  test-slow:
    name: Slow Tests (e2e + soak)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run slow-tier tests
        run: npm run test:slow

  macos-smoke:
    name: macOS Native ABI Smoke
    runs-on: macos-latest
    needs: [quality, test]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native

      - name: Build application
        run: npm run build

      - name: Verify native ABI
        run: node scripts/verify-native-abi.js

      - name: Electron packaging smoke (--dir, no signing)
        run: npx electron-builder --mac --dir --config electron-builder.json
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Launch packaged app smoke
        run: node scripts/packaged-startup-smoke.js
