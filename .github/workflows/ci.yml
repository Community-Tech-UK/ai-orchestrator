name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Oxlint (main process + shared)
        run: npm run lint:fast

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck specs
        run: npm run typecheck:spec

      - name: Verify IPC channels
        run: npm run verify:ipc

      - name: Verify package exports
        run: npm run verify:exports

      - name: Check TypeScript file size ratchet
        run: npm run check:ts-max-loc

      - name: Build main smoke
        run: npm run build:main

      - name: Build worker agent smoke
        run: npm run build:worker-agent

      - name: Build renderer (Angular AOT)
        run: npm run build:renderer

      - name: Verify architecture (import boundaries + inventory)
        run: npm run verify:architecture

      - name: Check contracts (schema/alias drift)
        run: npm run check:contracts

      - name: Check provider parity checklist
        run: npm run check:provider-parity

      # Allowlisted: protobufjs transitive CVE is unfixable upstream (package.json overrides).
      # New high-severity vulnerabilities will now fail the build.
      - name: Security audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: Run tests
        run: npm run test

  macos-smoke:
    name: macOS Native ABI Smoke
    runs-on: macos-latest
    needs: quality
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native

      - name: Build main process
        run: npm run build:main

      - name: Verify native ABI
        run: node scripts/verify-native-abi.js

      - name: Electron packaging smoke (--dir, no signing)
        run: npx electron-builder --mac --dir --config electron-builder.json
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
