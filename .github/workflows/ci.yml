name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck specs
        run: npm run typecheck:spec

      - name: Verify IPC channels
        run: npm run verify:ipc

      - name: Verify package exports
        run: npm run verify:exports

      - name: Build main smoke
        run: npm run build:main

      - name: Build worker agent smoke
        run: npm run build:worker-agent

      - name: Run tests
        run: npm run test
