<section
  class="control-shell"
  [class.layout-standard]="activeSurface().layout === 'standard'"
  [class.layout-wide]="activeSurface().layout === 'wide'"
  [class.layout-fullBleed]="activeSurface().layout === 'fullBleed'"
  [class.nav-collapsed]="controlNavCollapsed()"
>
  <header class="control-header">
    <button class="control-back" type="button" (click)="backToDashboard()" aria-label="Back to dashboard">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 12H5" />
        <path d="M12 19l-7-7 7-7" />
      </svg>
      <span>Back</span>
    </button>

    <div class="control-title-block">
      <p class="control-kicker">Control Center</p>
      <h1>{{ activeSurface().title }}</h1>
      @if (activeSurface().subtitle) {
        <p class="control-subtitle">{{ activeSurface().subtitle }}</p>
      }
    </div>
  </header>

  <div class="control-body">
    <aside id="control-center-navigation" class="control-nav" aria-label="Control Center navigation">
      <button
        class="control-nav-toggle"
        type="button"
        (click)="toggleControlNav()"
        aria-controls="control-center-navigation"
        [attr.aria-label]="controlNavCollapsed() ? 'Expand Control Center navigation' : 'Collapse Control Center navigation'"
        [attr.aria-expanded]="!controlNavCollapsed()"
        [title]="controlNavCollapsed() ? 'Expand navigation' : 'Collapse navigation'"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      @for (group of navGroups; track group.id) {
        <section class="control-nav-group">
          <h2>{{ group.label }}</h2>
          @for (item of group.items; track item.id) {
            <a
              class="control-nav-item"
              [routerLink]="item.path"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: isExactNavMatch(item.path) }"
              [title]="item.label"
              [attr.aria-label]="item.label"
            >
              <svg class="control-nav-icon" viewBox="0 0 24 24" aria-hidden="true" [innerHTML]="item.icon"></svg>
              <span>{{ item.label }}</span>
            </a>
          }
        </section>
      }
    </aside>

    <main class="control-content">
      <router-outlet />
    </main>

    @if (showHelpPane()) {
      <app-help-pane
        class="control-help-pane"
        [entry]="activeHelp()"
        [collapsed]="helpCollapsed()"
        (toggled)="toggleHelp()"
      />
    }
  </div>
</section>
