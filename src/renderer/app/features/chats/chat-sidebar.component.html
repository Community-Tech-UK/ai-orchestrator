<section class="chat-sidebar">
  <div class="chat-sidebar-header">
    <button type="button" class="new-chat-button" (click)="openCreate()">
      <span aria-hidden="true">+</span>
      New chat
    </button>
  </div>

  @if (showCreate()) {
    <form class="chat-create" (ngSubmit)="createChat()">
      <input
        class="chat-create-input"
        name="chat-name"
        placeholder="Name"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
      />
      <div class="chat-create-row">
        <app-compact-model-picker
          mode="pending-create"
          [selection]="formSelection()"
          (selectionChange)="formSelection.set($event)"
        />
      </div>
      <div class="chat-create-row">
        <input
          class="chat-create-input"
          name="cwd"
          placeholder="Working directory"
          [ngModel]="cwd()"
          (ngModelChange)="cwd.set($event)"
        />
        <button type="button" class="icon-button" title="Choose folder" (click)="browseCwd()">...</button>
      </div>
      <div class="chat-create-actions">
        <button type="button" class="text-button" (click)="showCreate.set(false)">Cancel</button>
        <button type="submit" class="primary-button" [disabled]="!canCreate()">Create</button>
      </div>
    </form>
  }
</section>
